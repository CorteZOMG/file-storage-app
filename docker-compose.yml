services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: file-storage-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - file-storage-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

  nginx:
    image: nginx:1.27-alpine
    container_name: file-storage-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - file-storage-network
    depends_on:
      - app

  db:
    image: mysql:8.4
    container_name: file-storage-db
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - file-storage-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db_testing:
    image: mysql:8.4
    container_name: file-storage-db-testing
    restart: unless-stopped
    ports:
      - "${DB_TESTING_EXTERNAL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: file_storage_testing
      MYSQL_USER: file_storage_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - db_testing_data:/var/lib/mysql
    networks:
      - file-storage-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: file-storage-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - file-storage-network
    depends_on:
      - app
      - db
    environment:
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    command: php artisan schedule:work

  frontend:
    build:
      context: .
      dockerfile: docker/nuxt/Dockerfile
    container_name: file-storage-nuxt
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - file-storage-network
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8080/api

networks:
  file-storage-network:
    driver: bridge

volumes:
  db_data:
    driver: local
  db_testing_data:
    driver: local
